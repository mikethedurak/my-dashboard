<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One Piece SAMPLE Removal Test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #111; color: #eee; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 1200px; }
    .card { background: #1b1b1b; border: 1px solid #333; border-radius: 10px; padding: 12px; }
    img { width: 100%; height: auto; display: block; border-radius: 8px; }
    h2 { margin: 0 0 10px; font-size: 16px; }
    p { color: #aaa; font-size: 13px; }
  </style>
</head>
<body>
  <h1>One Piece SAMPLE Removal Test</h1>
  <p>If images don't load, keep this HTML in the same folder as the PNG files.</p>
  <div class="grid">
    <div class="card">
      <h2>Before</h2>
      <img src="OP15-113_v0_before.png" alt="Before">
    </div>
    <div class="card">
      <h2>After (pillow fallback)</h2>
      <img src="OP15-113_v0_after_pillow-fallback.png" alt="After">
    </div>
  </div>
</body>
</html>

name: Daily dashboard update

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "What should run?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - cards
          - specials
          - events
          - releases
          - coming-soon
          - game-releases
          - news
          - media
          - digest

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run One Piece card scraper
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'cards' }}
        env:
          SCRAPE_OP_MISSING_CARDS_DRIVE_URL: ${{ secrets.SCRAPE_OP_MISSING_CARDS_DRIVE_URL }}
          SCRAPE_OP_MISSING_CARDS_DRIVE_FILE_ID: ${{ secrets.SCRAPE_OP_MISSING_CARDS_DRIVE_FILE_ID }}
        run: python services/one_piece/find_missing_cards.py all

      - name: Run release radar
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'releases' }}
        run: python services/release_radar/scrape_releases.py

      - name: Run coming soon radar
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'coming-soon' }}
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python services/release_radar/scrape_coming_soon.py

      - name: Run game release radar
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'game-releases' }}
        env:
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: python services/release_radar/scrape_game_releases.py

      - name: Run news radar
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'news' }}
        run: python services/scrape_news.py

      - name: Run media watchlists
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'media' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: python services/media/scrape_watchlist.py --scope both

      - name: Run specials events
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'specials' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python services/events/scrape_specials.py

      - name: Run Quicket events
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'events' }}
        run: python services/events/scrape_quicket_events.py

      - name: Run Webtickets events
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'events' }}
        run: python services/events/scrape_webtickets_events.py

      - name: Run Google calendar events
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'events' }}
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CALENDAR_IDS: ${{ secrets.GOOGLE_CALENDAR_IDS }}
        run: python services/events/scrape_google_calendar.py

      - name: Update dashboard data
        run: |
          rm -rf docs/data
          cp -r data docs/data
          python -c "import json, datetime; json.dump({'last_scraped_at': datetime.datetime.now(datetime.timezone.utc).isoformat()}, open('docs/data/metadata.json','w', encoding='utf-8'), indent=2)"

      - name: Send daily dashboard digest
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'digest' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python services/daily_digest/send_daily_digest.py

      - name: Commit updated reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .scrape data docs
          git diff --cached --quiet || git commit -m "Update daily dashboard data"
          git push

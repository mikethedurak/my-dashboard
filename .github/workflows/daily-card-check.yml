name: Daily card check

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run daily card notification
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python notify_new_cards.py --store all --mode all

      - name: Commit updated reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .scrape/previous_*_missing_available.csv .scrape/latest_new_cards.txt *_missing_available.csv *_missing_available.md all_stores_missing_available.csv all_stores_missing_available.md
          git diff --cached --quiet || git commit -m "Update daily card scrape"
          git push

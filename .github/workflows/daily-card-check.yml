name: Daily card check

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "What should run?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - cards
          - specials
          - releases
          - coming-soon

permissions:
  contents: write

jobs:
  check-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run daily card notification
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'cards' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python one-piece/notify_new_cards.py --store all --mode all

      - name: Run release radar
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'releases' }}
        run: python release-radar/scrape_releases.py

      - name: Run coming soon radar
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'coming-soon' }}
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
        run: python release-radar/scrape_coming_soon.py

      - name: Run specials events
        if: ${{ github.event_name == 'schedule' || inputs.task == 'all' || inputs.task == 'specials' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python events/scrape_specials.py

      - name: Update dashboard data
        run: |
          mkdir -p docs/data
          cp one-piece/data/*.csv docs/data/
          cp one-piece/data/*.json docs/data/
          cp release-radar/data/*.json docs/data/
          cp events/data/*.json docs/data/

      - name: Commit updated reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .scrape/previous_*_missing_available.csv .scrape/latest_new_cards.txt one-piece/data/*.csv one-piece/data/*.md one-piece/data/*.json release-radar/data/*.json events/data/*.json docs
          git diff --cached --quiet || git commit -m "Update daily card scrape"
          git push
